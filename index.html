<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="screen-orientation" content="portrait">
    <meta name="orientation" content="portrait">

    <title>Inscrição Dança SJC</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="bloqueio-rotacao">
        <div class="conteudo-bloqueio">
            <div class="icone-rotacao"></div>
            <p>Gire o celular para usar na vertical</p>
        </div>
    </div>

    <div class="vidro-container">
        <h2 class="titulo-app">Inscrição Dança SJC</h2>

        <div class="container-inputs">
            <input type="text" id="nome_user" placeholder="Nome Completo" class="input-estilo">
            <input type="text" id="tamanho_user" placeholder="Tamanho da Camisa (P, M, G...)" class="input-estilo">
            <input type="text" id="rua_user" placeholder="Rua e Número (Ex: Rua A, 123)" class="input-estilo">
            <input type="text" id="bairro_user" placeholder="Bairro" class="input-estilo">
            <input type="tel" id="telefone_user" placeholder="Telefone (com DDD)" class="input-estilo">
        </div>

        <div class="botoes-container">
            <button onclick="enviarWhats('MOTORAMA', 'Terças: 19h às 20h')" class="btn">
                <strong>MOTORAMA</strong>
                <span>Terças: 19h às 20h</span>
            </button>

            <button onclick="enviarWhats('NOVO HORIZONTE', 'Terças: 20h30 às 21h30')" class="btn">
                <strong>NOVO HORIZONTE</strong>
                <span>Terças: 20h30 às 21h30</span>
            </button>

            <button onclick="enviarWhats('TATETUBA', 'Quintas: 19h às 21h')" class="btn">
                <strong>TATETUBA</strong>
                <span>Quintas: 19h às 21h</span>
            </button>

            <button onclick="enviarWhats('GALO BRANCO', 'Sextas: 19h às 21h')" class="btn">
                <strong>GALO BRANCO</strong>
                <span>Sextas: 19h às 21h</span>
            </button>
        </div>
    </div>

    <!-- JS separado -->
    <script src="script.js"></script>
</body>

</html>
